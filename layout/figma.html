<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>한게임 레이아웃 + 시작화면</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:sans-serif;
  background:white;
}

/* 공통 */
.wrap{
  max-width:1200px;
  margin:0 auto;
  padding:32px;
}
.box{
  background:gray;
  border:4px solid black;
  border-radius:12px;
}

/* ===================== */
/* 기존 메인 레이아웃 */
/* ===================== */

.top{height:60px;}
.header{height:90px;margin-top:24px;}

.banner{
  height:320px;
  margin:60px 0;
  margin-left:40px;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.section{
  margin-bottom:120px;
  padding-top:40px;
}
.section h2{
  margin-bottom:32px;
  font-size:22px;
  color:#000;
}

.channel{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:32px;
}
.video-big{height:360px;}
.video-small{height:170px;margin-bottom:32px;}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:32px;
}
.card{
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.footer{
  height:160px;
  margin-top:120px;
}

/* ===================== */
/* 시작화면 레이아웃 */
/* ===================== */

.start-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.start-window{
  width:420px;
  padding:28px;
  background:#fff;
  border:4px solid #000;
  border-radius:16px;
  color:#000;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* 썸네일 */
.start-thumb{
  height:200px;
  background:#ddd;
  border:3px dashed #000;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
}

/* 게임 정보 */
.start-info{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.start-title{
  height:36px;
  background:#eee;
  border:2px dashed #000;
  display:flex;
  align-items:center;
  padding-left:12px;
  font-size:18px;
}

/* 버튼 영역 */
.start-buttons{
  display:flex;
  gap:12px;
  margin-top:10px;
}

.start-btn{
  flex:1;
  height:52px;
  background:#ddd;
  border:3px dashed #000;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
}

/* 닫기 */
.start-close{
  height:44px;
  background:#eee;
  border:2px dashed #000;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
}

/* ===== 중간 전체 배너 ===== */
.mid-banner-wrap{
  margin:100px 0;
}

.mid-banner{
  height:220px;
  background:gray;
  border:4px solid #000;
  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:center;
}

/* 반응형 */
@media(max-width:768px){
  .channel{grid-template-columns:1fr}
  .grid{grid-template-columns:repeat(2,1fr)}
  .banner{margin-left:0;}
}
</style>
</head>

<body>


<!-- ================= 기존 한게임 메인 ================= -->

<div class="wrap box top">Top User Bar</div>

<div class="wrap box header">Header / Navigation</div>

<div class="wrap">
  <div class="box banner">Main Banner Area</div>
</div>

<main class="wrap">

  <section class="section">
    <h2>title</h2>
    <div class="grid">
      <div class="box card">image</div>
      <div class="box card">image</div>
      <div class="box card">image</div>
      <div class="box card">image</div>
    </div>
  </section>

  <section class="section">
    <h2>title</h2>
    <div class="grid">
      <div class="box card">image</div>
      <div class="box card">image</div>
      <div class="box card">image</div>
      <div class="box card">image</div>
    </div>
  </section>

  <!-- ✅ 중간 전체 배너 -->
<section class="section">
  <div class="wrap">
    <div class="mid-banner">
      mid banner ara
      
    </div>
  </div>
</section>

<section class="section">
  <section class="section">
    <h2>title</h2>

    <div class="channel">
      <div class="box video-big">Video</div>

      <div>
        <div class="box video-small">Video</div>
        <div class="box video-small">Video</div>
      </div>
    </div>
  </section>

  <section class="section">
    <h2>title</h2>

    <div class="grid">
      <div class="box card">image</div>
      <div class="box card">image</div>
      <div class="box card">image</div>
      <div class="box card">image</div>
      <div class="box card">image</div>
      <div class="box card">image</div>
    </div>
  </section>

</main>

<div class="wrap box footer">Footer</div>

</body>
</html>
